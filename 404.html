  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'UA-170360802-1');

  <meta charset="utf-8">

<body>
  Hang on! I'm sending you over to the full URL...
  <script>
    function routeTo({ url, deepLink }) {
      window.location.replace(deepLink || url);

      if (deepLink) {
        setTimeout(() => window.location.replace(url), 1000);
      }
    }

    window.onload = () => {
      switch (window.location.pathname) {
        case '/twitch':
          return routeTo({
            url: 'https://twitch.tv/jzimz',
            deep: 'twitch://stream/jzimz'
          })
        case '/discord':
          return routeTo({ url: 'https://discord.gg/aV37twc' })
        case '/yt':
        case '/youtube':
          return routeTo({ url: 'https://youtube.com/jzimz'})
        case '/tiktok':
          return routeTo({ url: 'https://tiktok.com/@jzimz'})
        case '/instagram':
          return routeTo({ url: 'https://instagram.com/jzimztv' })
        // Short URLs
        case '/medium':
          return routeTo({ url: 'https://medium.com/@jzimz/comparing-the-top-streaming-platforms-253b4bcb7b5e' })
        case '/bio-template':
          return routeTo({ url: 'https://github.com/jzimz/bio-template' })
        default:
          return routeTo({ url: '/' })
      }
    }
  </script>
</body>

</html>
